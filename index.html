<!DOCTYPE html>

    <!-- ──────────────────────────────────────────────
         Primary metadata
         Per-page metadata is overridden by react-helmet-async
         on the route components. The values below are the
         site-wide defaults that ship in the static HTML —
         used by crawlers that don't execute JS, and by the
         OG/Twitter scrapers that hit the document on first
         request.
         ────────────────────────────────────────────── */ -->
    <title>Undercat Creatives — Brand films, social, direction · Bangkok</title>
    <meta
      name="description"
      content="A small Bangkok studio that owns the whole thing — brief to final cut. Brand films, social content, creative direction for brands that treat image as a business decision. Worked with Audi Thailand, Greenline Golf, Ducati, FC Bayern."
    />
    <meta name="keywords" content="brand film Bangkok, video production studio Thailand, creative direction, automotive content, social content production, Audi Thailand, Greenline Golf, production house กรุงเทพ" />
    <link rel="canonical" href="https://www.undercatcreatives.com/" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="Undercat Creatives" />

    <meta property="og:site_name" content="Undercat Creatives" />
    <meta property="og:title" content="Undercat Creatives — Content with direction. Production with taste." />
    <meta property="og:description" content="A small Bangkok studio for founders who treat image as part of the product, not the wrapper around it." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.undercatcreatives.com/" />
    <meta property="og:image" content="https://www.undercatcreatives.com/og-default.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta property="og:locale" content="th_TH" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Undercat Creatives" />
    <meta name="twitter:description" content="Content with direction. Production with taste." />
    <meta name="twitter:image" content="https://www.undercatcreatives.com/og-default.jpg" />
    <meta name="twitter:image:alt" content="Undercat Creatives — Bangkok production studio." />
